# ============================================================
# Kitty Neon Pop Rice — tuned for Wayland + GNOME Blur My Shell
# ============================================================

# --- Wayland tweaks ------------------------------------------
linux_display_server wayland
hide_window_decorations yes
term xterm-kitty
shell_integration no-cursor

# --- Font ----------------------------------------------------
font_family        SauceCodePro Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          12.5

# --- Cursor --------------------------------------------------
cursor_shape block
cursor_blink_interval 600
cursor_stop_blinking_after 0
cursor             #e14eca
cursor_text_color  #1b1b1d

# --- Background / opacity ------------------------------------
background          #1b1b1d
foreground          #e4d7e8
background_opacity  0.85
background_tint     0.92
background_image    none   # Blur My Shell handles blur

# --- Borders / padding ---------------------------------------
window_border_width  2
active_border_color  #8ef76a
inactive_border_color #2f2f33
window_padding_width 8
window_margin_width  6
remember_window_size no
initial_window_width 1200
initial_window_height 750

# --- Colors --------------------------------------------------
color0  #2a2a2e
color1  #e14eca
color2  #8ef76a
color3  #f4a261
color4  #7a6ff0
color5  #c46ef9
color6  #63e6be
color7  #e4d7e8
color8  #45454a
color9  #ff6bd6
color10 #b3ffa1
color11 #ffcb8e
color12 #9d92ff
color13 #e58cff
color14 #8fffe2
color15 #ffffff

selection_foreground #1b1b1d
selection_background #7a6ff0

# --- Layouts / tabs ------------------------------------------
enabled_layouts tall
tab_bar_style powerline
tab_powerline_style angled
tab_bar_edge bottom
tab_bar_align left
tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal
active_tab_foreground   #1b1b1d
active_tab_background   #e14eca
inactive_tab_foreground #e4d7e8
inactive_tab_background #2a2a2e
tab_separator " "

# --- Window / tab management --------------------------------
map ctrl+shift+enter new_window
map ctrl+shift+right next_window
map ctrl+shift+left  previous_window
map ctrl+shift+q     close_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab

# --- Scrollback / mouse -------------------------------------
scrollback_lines 5000
wheel_scroll_multiplier 3.0
mouse_hide_wait -1

enable_audio_bell no
